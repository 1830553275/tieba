name: 飞书签到通知

on:
  schedule:
    - cron: '10 2 * * *'
  workflow_dispatch:

jobs:
  notify-feishu:
    runs-on: ubuntu-latest
    steps:
      - name: 发送飞书通知
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        run: |
          echo "========== 排查信息 =========="
          if [ -z "$FEISHU_WEBHOOK" ]; then
            echo "未配置 FEISHU_WEBHOOK"
            exit 1
          fi
          echo "FEISHU_WEBHOOK 已配置"
          echo "URL 长度: ${#FEISHU_WEBHOOK}"
          echo "URL 前缀: ${FEISHU_WEBHOOK:0:50}"

          BJ_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

          MSG="{\"msg_type\":\"text\",\"content\":{\"text\":\"GitHub Actions test - ${BJ_TIME}\"}}"

          if [ -n "$FEISHU_SECRET" ]; then
            TIMESTAMP=$(date +%s)
            STRING_TO_SIGN="${TIMESTAMP}\n${FEISHU_SECRET}"
            SIGN=$(printf "$STRING_TO_SIGN" | openssl dgst -sha256 -hmac "$FEISHU_SECRET" -binary | base64)
            WEBHOOK_URL="${FEISHU_WEBHOOK}&timestamp=${TIMESTAMP}&sign=${SIGN}"
          else
            WEBHOOK_URL="$FEISHU_WEBHOOK"
          fi

          HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$MSG")

          RESP=$(cat /tmp/resp.txt)
          echo ""
          echo "========== 飞书返回 =========="
          echo "HTTP: $HTTP_CODE"
          echo "Resp: $RESP"
          echo ""

          if echo "$RESP" | grep -q '"code":0'; then
            echo "OK"
          elif echo "$RESP" | grep -q '19021'; then
            echo "ERR: 签名校验失败"
          elif echo "$RESP" | grep -q '9499'; then
            echo "ERR: Webhook 失效"
          elif echo "$RESP" | grep -q '19022'; then
            echo "ERR: IP 白名单"
          fi
