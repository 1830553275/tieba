name: 飞书签到通知

on:
  schedule:
    # 每天北京时间 10:40 执行（签到完成后约 10 分钟）
    - cron: '40 2 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 查询最近一次签到结果
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "仓库: ${{ github.repository }}"

          # 用 GITHUB_TOKEN 调 GitHub API 获取最近一次 workflow 运行
          RUN=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=5")

          # 解析：找 name="百度网盘自动签到" 的最近一次
          # 简单的逐行解析，避开 jq 依赖
          CONCLUSION=$(echo "$RUN" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for r in data.get('workflow_runs', []):
              if '百度网盘' in r.get('name',''):
                  print(r.get('conclusion','') or '')
                  break
          ")
          URL=$(echo "$RUN" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for r in data.get('workflow_runs', []):
              if '百度网盘' in r.get('name',''):
                  print(r.get('html_url',''))
                  break
          ")
          CREATED=$(echo "$RUN" | python3 -c "
          import sys, json, datetime
          data = json.load(sys.stdin)
          for r in data.get('workflow_runs', []):
              if '百度网盘' in r.get('name',''):
                  t = r.get('created_at','')
                  if t:
                      dt = datetime.datetime.fromisoformat(t.replace('Z','+00:00'))
                      bj = dt + datetime.timedelta(hours=8)
                      print(bj.strftime('%Y-%m-%d %H:%M:%S'))
                  break
          ")

          echo "最近一次签到: $CONCLUSION"
          echo "URL: $URL"
          echo "时间: $CREATED"

          echo "conclusion=$CONCLUSION" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "created=$CREATED" >> $GITHUB_OUTPUT

      - name: 发送飞书通知
        if: steps.check.outputs.conclusion == 'success' || steps.check.outputs.conclusion == 'failure' || steps.check.outputs.conclusion == 'cancelled'
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          CONCLUSION: ${{ steps.check.outputs.conclusion }}
          URL: ${{ steps.check.outputs.url }}
          CREATED: ${{ steps.check.outputs.created }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$CONCLUSION" = "success" ]; then
            COLOR="green"
            EMOJI="✅"
            TEXT="成功"
          elif [ "$CONCLUSION" = "failure" ]; then
            COLOR="red"
            EMOJI="❌"
            TEXT="失败"
          else
            COLOR="grey"
            EMOJI="⏹️"
            TEXT="已取消"
          fi

          TITLE="${EMOJI} 百度网盘签到${TEXT}"
          CONTENT="**完成时间**：${CREATED}\n**仓库**：${REPO}"

          # 生成签名（如果 FEISHU_SECRET 存在）
          TIMESTAMP=$(date +%s)
          SIGN=""

          PAYLOAD=$(cat <<EOF
          {
            "timestamp": "${TIMESTAMP}",
            "sign": "${SIGN}",
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": {"tag": "plain_text", "content": "${TITLE}"},
                "template": "${COLOR}"
              },
              "elements": [
                {"tag": "div", "text": {"tag": "lark_md", "content": "${CONTENT}"}},
                {"tag": "action", "actions": [
                  {"tag": "button", "text": {"tag": "plain_text", "content": "查看运行日志"}, "type": "primary", "url": "${URL}"}
                ]}
              ]
            }
          }
          EOF
          )

          # 如果没有 secret，去掉 sign 字段
          if [ -z "$FEISHU_SECRET" ]; then
            PAYLOAD=$(echo "$PAYLOAD" | python3 -c "
          import sys, json
          d=json.load(sys.stdin)
          d.pop('sign', None)
          d.pop('timestamp', None)
          print(json.dumps(d))
          ")
          else
            # 计算签名
            STRING_TO_SIGN="${TIMESTAMP}\n${FEISHU_SECRET}"
            SIGN=$(printf "${STRING_TO_SIGN}" | openssl dgst -sha256 -hmac "${FEISHU_SECRET}" -binary | base64)
            PAYLOAD=$(echo "$PAYLOAD" | python3 -c "
          import sys, json
          d=json.load(sys.stdin)
          d['sign']='${SIGN}'
          print(json.dumps(d))
          ")
          fi

          echo "请求飞书..."
          RESP=$(curl -sS -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "飞书返回: $RESP"
